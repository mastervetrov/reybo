spring:
  application:
    name: crm
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/crm_db}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:create}
    show-sql: true
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html

server:
  port: 8082
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE:http://localhost:8761/eureka/}

liquibase:
  enabled: ${LIQUIBASE_ENABLED:false}
  default-schema: ${LIQUIBASE_DEFAULT_DB_SCHEMA:crm_schema}

#Настройка количества выводимых элементов в таблице Remainder
remainder-table:
  pageSize: 100