databaseChangeLog:
  - changeSet:
      id: 1
      author: Rumyancev Ivan
      changes:
        - createTable:
            tableName: permission
            columns:
              - column:
                  name: id
                  type: serial
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: role_id
                  type: integer



  - changeSet:
      id: 2
      author: Rumyancev Ivan
      changes:
        - createTable:
            tableName: product
            columns:
              - column:
                  name: id
                  type: serial
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: retail_price
                  type: decimal
                  constraints:
                    nullable: false
              - column:
                  name: dealer_price
                  type: decimal
                  constraints:
                    nullable: false
              - column:
                  name: partner_price
                  type: decimal
                  constraints:
                    nullable: false
              - column:
                  name: count
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: is_new
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: is_hit
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: picture
                  type: varchar(1000)
              - column:
                  name: category_id
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false


