  redis:
    image: redis:7.0.12
    container_name: redis
    command: [ "redis-server", "--appendonly", "yes", "--requirepass", "redis" ]
    ports:
      - "6379:6379"
    networks:
      - microservices-net

  mongodb:
    image: mongo:4.4.24
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: appdatabase
    networks:
      - microservices-net

  # ============GATEWAY===============
  gateway:
    container_name: gateway
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8765:8765"
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE=http://eureka:8761/eureka/
    depends_on:
      - eureka
    networks:
      - microservices-net
      - keycloak-net
  # =================== KEYCLOAK ===================
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:15.1.1

    environment:
      KEYCLOAK_LOGLEVEL: DEBUG

      DB_VENDOR: postgres
      DB_ADDR: postgres
      DB_PORT: 5432
      DB_DATABASE: ${KEYCLOAK_DB_TITLE}
      DB_USER: ${KEYCLOAK_DB_USERNAME}
      DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}

      # Hostname & Proxy
      KEYCLOAK_HOSTNAME: auth.reybo.ru
      KEYCLOAK_PORT: 8080
      PROXY_ADDRESS_FORWARDING: "true"
      KEYCLOAK_FRONTEND_URL: https://auth.reybo.ru/auth

      # Admin
      KEYCLOAK_USER: ${KEYCLOAK_ADMIN_USERNAME}
      KEYCLOAK_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      # Java opts
      JAVA_OPTS: "-Xms512m -Xmx768m -XX:MaxRAMPercentage=70"

    ports:
      - "8080:8080"
    networks:
      - keycloak-net
